# TestContainers configuration for Docker Desktop on macOS
# Fixes socket path detection issues

# Use the standard Docker socket path
docker.host=unix:///var/run/docker.sock

# Use Unix socket strategy explicitly
docker.client.strategy=org.testcontainers.dockerclient.UnixSocketClientProviderStrategy

# Disable Ryuk - the container that cleans up orphaned containers
# This avoids the "operation not supported" error when Ryuk tries to mount the Docker socket
ryuk.disabled=true

# Disable startup checks for faster startup
checks.disable=true
