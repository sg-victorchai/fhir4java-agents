# DiagnosticReport Resource Configuration
resourceType: DiagnosticReport
enabled: true

# Multiple FHIR versions support
fhirVersions:
  - version: R5
    default: true

# Database schema configuration
schema:
  type: shared
  name: patientdata

# Enabled interactions
interactions:
  read: true
  vread: true
  create: true
  update: true
  patch: false
  delete: false
  search: true
  history: true

# No search parameter restrictions - all DiagnosticReport search parameters are allowed

# Required/optional profiles
profiles:
  - url: http://hl7.org/fhir/StructureDefinition/DiagnosticReport
    required: true
