name: Deploy to AWS

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      app_name:
        description: 'Application name prefix'
        required: false
        default: 'fhir4java'
      environment:
        description: 'Deployment environment'
        required: false
        default: 'prod'
        type: choice
        options:
          - dev
          - sit
          - uat
          - prod

env:
  AWS_REGION: us-east-1
  # Use workflow_dispatch inputs if available, otherwise use repository variables or defaults
  APP_NAME: ${{ github.event.inputs.app_name || vars.APP_NAME || 'fhir4java' }}
  ENVIRONMENT: ${{ github.event.inputs.environment || vars.ENVIRONMENT || 'prod' }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ github.sha }}
      resource-prefix: ${{ env.APP_NAME }}-${{ env.ENVIRONMENT }}

    steps:
      - uses: actions/checkout@v4

      - name: Set resource prefix
        id: prefix
        run: |
          echo "RESOURCE_PREFIX=${{ env.APP_NAME }}-${{ env.ENVIRONMENT }}" >> $GITHUB_ENV
          echo "ECR_REPOSITORY=${{ env.APP_NAME }}-${{ env.ENVIRONMENT }}-app" >> $GITHUB_ENV
          echo "ECS_CLUSTER=${{ env.APP_NAME }}-${{ env.ENVIRONMENT }}-cluster" >> $GITHUB_ENV

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: ./mvnw clean package -DskipTests -B

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Scan image for vulnerabilities
        run: |
          aws ecr start-image-scan \
            --repository-name $ECR_REPOSITORY \
            --image-id imageTag=${{ github.sha }} || true

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 2
      matrix:
        service: [fhir-api, fhir-metadata, fhir-actuator, fhir-admin]

    steps:
      - name: Set resource prefix
        run: |
          echo "RESOURCE_PREFIX=${{ env.APP_NAME }}-${{ env.ENVIRONMENT }}" >> $GITHUB_ENV
          echo "ECS_CLUSTER=${{ env.APP_NAME }}-${{ env.ENVIRONMENT }}-cluster" >> $GITHUB_ENV

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy ${{ matrix.service }} to ECS
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $RESOURCE_PREFIX-${{ matrix.service }} \
            --force-new-deployment
